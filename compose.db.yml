services:
  postgres:
    image: postgres:16-alpine
    container_name: vpn-shop-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vpn_shop
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vpn_shop"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - vpn_shop_postgres_data:/var/lib/postgresql/data

volumes:
  vpn_shop_postgres_data:
