services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vpn-shop-app
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./logs:/app/logs
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5433/vpn_shop?schema=public
      NEXT_TELEMETRY_DISABLED: "1"
      NODE_ENV: production
      PORT: "5901"
