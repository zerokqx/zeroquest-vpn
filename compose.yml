services:
  postgres:
    image: postgres:16-alpine
    container_name: vpn-shop-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: vpn_shop
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d vpn_shop"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - vpn_shop_postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vpn-shop-app
    restart: unless-stopped
    network_mode: host
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.local
    environment:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5433/vpn_shop?schema=public
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      PORT: "5901"

volumes:
  vpn_shop_postgres_data:
